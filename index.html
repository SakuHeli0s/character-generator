<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de tarjetas de personajes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-----INTRODUCIR NOMBRE PERSONAJE----->

    <section class="container-select">
        <div class="chara-select">
            <input id="input-name" class="input-name" type="text" placeholder="Introduce el nombre...">
            
            <select name="chara-select" id="chara-option" class="chara-option">
                <option value="bruja">Bruja</option>
                <option value="arquero">Arquero</option>
                <option value="maga">Maga</option>
                <option value="caballero">Caballero</option>
            </select>

            <button id="btn-chara" class="btn-chara">Crear personaje</button>
        </div>
    </section>


    <!-----TARJETA DE PERSONAJE------>

    <section id="chara-container" class="chara-container">
        <div class="chara-sheet-container">
            <div id="chara-sheet" class="chara-sheet">
                <div class="chara-img">
                    <img src="./img/bruja.jpg" alt="Imagen de bruja">
                </div>

                <div id="chara-info" class="chara-info">
                    <p id="chara-name">Nombre: Aria</p>
                    <p id="stat-class">Clase: Bruja</p>
                    <p id="stat-hp">Vida: 80</p>
                    <p id="stat-mp">Magia: 120</p>
                    <p id="stat-str">Fuerza: 15</p>
                    <p id="stat-def">Defensa: 20</p>
                </div>
            </div>
        </div>
    </section>

    <!-------JAVASCRIPT------>
    <script src="main.js"></script>
    
</body>
</html>
