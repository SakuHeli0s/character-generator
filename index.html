<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de tarjetas de personajes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!--INTRODUCIR NOMBRE PERSONAJE-->

    <section id="container-select" class="container-select">
        <div id="chara-select" class="chara-select">
            <input id="input-name" type="text" placeholder="Introduce el nombre">
            <select name="" id="chara-option">
                <option value="">Bruja</option>
                <option value="">Arquero</option>
                <option value="">Maga</option>
                <option value="">Caballero</option>
            </select>
        </div>
    </section>

    <!-----TARJETA DE PERSONAJE------>

    <section id="chara" class="container chara-container">
        <div id="chara-sheet" class="chara-sheet">
            <img src="" alt="">
        </div>
    </section>
    
    <!-------JAVASCRIPT------>
    <script src="main.js"></script>
    
</body>
</html>
